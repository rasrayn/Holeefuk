<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holeefuktattoo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../Holeefuk/Recursos/favicon.png">
</head>
<body>
    <div id="overlay"></div>
    <header class="header">
        <img src="../Holeefuk/Recursos/logoHoleefuktatoo2.png" id="ocultar-img" alt="logo Holeefuk" style="width: 10rem; margin-left: 2.5rem; overflow: cover;" class="logo__header">
        <nav class="btn__menu">
            <button type="button" class="btn__nav" id="btn__nav">
                <div class="header__nav-logo header__nav-logo1" id="logo1"></div>
                <div class="header__nav-logo header__nav-logo2" id="logo2"></div>
                <div class="header__nav-logo header__nav-logo3" id="logo3"></div>
            </button>
        </nav>
        <nav class="header__nav">
            
            <ul class="navbar__header">
                <img src="../Holeefuk/Recursos/Máquinas de tatuaje cruzadas (1).png" alt="logo Holeefuk" style="width: 10rem; margin: 1.5rem;">
                <li class="navbar__header-item"><a href="#about">SOBRE MI</a></li>
                <li class="navbar__header-item"><a href="#services">TATTOOS</a></li>
                <li class="navbar__header-item"><a href="#contact">RESERVA UNA CITA</a></li>
            </ul>
        </nav>
    </header>
    <section class="titulo__header rellax">
        <h1 class="hlf" >HOLEEFUK</h1>
        <h2 class="subtitulo__header"> ESTUDIO DE <strong>TATUAJES</strong> Y PIERCINGS</h2>
    </section>
    <div class="bg__div-container" id="bg__oscuro"></div>  
    <!--seccion.1 -->
    <div class="page__container" id="bg__claro">
        <section class="secction__project" id="services">
            <h2 class="titulo__seccion1">TATTOOS</h2>
                <div class="slider">
                    <div class="list__slider">
                        <div class="item item1" style="--position: 1"><img src="slider/imgSlider (4).jpg" alt=""></div>
                        <div class="item item2" style="--position: 2"><img src="slider/imgSlider (5).jpg" alt=""></div>
                        <div class="item item3" style="--position: 3"><img src="slider/imgSlider (6).jpg" alt=""></div>
                        <div class="item item4" style="--position: 4"><img src="slider/imgSlider (7).jpg" alt=""></div>
                        <div class="item item5" style="--position: 5"><img src="slider/imgSlider9.jpg" alt=""></div>
                    </div>
                </div>
        </section>
    <!--seccion.2 -->
        <section class="secction__about" id="about">
            <h2>SOBRE MI</h2>
            <p>We are a professional tattoo studio dedicated to providing high-quality tattoos and a comfortable experience.</p>
        </section>
    <!--seccion.3 -->
        <section class="section__reservar" id="contact">
                <h2>RESERVA UNA LLAMADA</h2>
                <form action="#" method="post">
                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="name"><br><br>

                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email"><br><br>

                    <input type="submit" value="Submit">
                </form>
        </section>
    <!--footer-->
        <footer class="footer__container">
            <p>&copy; 2023 Holeefuktattoo. All rights reserved.</p>
        </footer>
    </div>  
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dixonandmoe/rellax@master/rellax.min.js"></script>
    <script>
    // Accepts any class name
        var rellax = new Rellax('.rellax', {
            speed: 2,
            center: false,
            round: true,
            vertical: true,
            horizontal: false
        });
    </script>
</body>
</html>
